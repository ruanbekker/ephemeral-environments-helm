name: Preview Environment

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  deploy-preview:
    runs-on: self-hosted
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Install kubectl
      uses: azure/setup-kubectl@v4
    - name: Install Helm
      uses: azure/setup-helm@v4

    - name: Configure kubeconfig
      run: |
        mkdir -p ~/.kube
        echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config

    - name: Generate preview name
      id: env
      run: |
        BRANCH=${GITHUB_HEAD_REF}
        SHORT=$(echo $BRANCH | sed 's|task/||' | cut -c1-8)
        PR=${{ github.event.pull_request.number }}

        NAME="pr-${PR}-${SHORT}"

        echo "name=$NAME" >> $GITHUB_OUTPUT
        echo "namespace=$NAME" >> $GITHUB_OUTPUT

    - name: Build image
      run: |
        IMAGE=ttl.sh/1eca92b098ba9d96-${{ steps.env.outputs.name }}:1h

        docker build -f cicd/docker/Dockerfile -t $IMAGE .
        docker push $IMAGE

        echo "IMAGE=$IMAGE" >> $GITHUB_ENV

    - name: Create namespace
      run: |
        echo kubectl create namespace ${{ steps.env.outputs.namespace }} || true

    - name: Deploy Helm
      run: |
        echo helm upgrade --install \
        ${{ steps.env.outputs.name }} \
        cicd/helm/fact-app \
        --namespace ${{ steps.env.outputs.namespace }} \
        --set image.repository=$IMAGE \
        --set env.PR_NUMBER=${{ github.event.pull_request.number }} \
        --set env.VERSION=preview \
        --set env.COMMIT=${{ github.sha }}

    - name: Post PR Comment
      uses: actions/github-script@v7
      with:
        script: |
          const pr = context.issue.number
          const name = "${{ steps.env.outputs.name }}"

          const body = `
🚀 Preview environment ready

Environment: **${name}**

URL:
https://${name}.demo.yourdomain.com

Image:
${process.env.IMAGE}
`

          github.rest.issues.createComment({
            issue_number: pr,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: body
          })
